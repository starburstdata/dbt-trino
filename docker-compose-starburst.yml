version: "3.9"
services:
  trino:
    ports:
      - "8080:8080"
    image: "starburstdata/starburst-enterprise:379-e"
    volumes:
      - ./docker/starburst/etc:/etc/starburst
      - ./docker/starburst/catalog:/etc/starburst/catalog

  postgres:
    ports:
      - "5432:5432"
    image: postgres:11
    environment:
      POSTGRES_USER: dbt-trino
      POSTGRES_PASSWORD: dbt-trino
    profiles:
        - postgres

  hive-metastore:
    hostname: hive-metastore
    image: 'michieldesmet/hive-metastore:latest'
    ports:
      - '9083:9083' # Metastore Thrift
    volumes:
      - ./docker/hive/metastore-site.xml:/opt/apache-hive-metastore-3.0.0-bin/conf/metastore-site.xml:ro
    profiles:
        - datalake
  
  minio:
    hostname: minio
    image: 'minio/minio:RELEASE.2022-05-26T05-48-41Z'
    container_name: minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    command: server /data --console-address ":9001"
    profiles:
        - datalake

  mc-job:
    image: 'minio/mc:RELEASE.2022-05-09T04-08-26Z'
    entrypoint: |
      /bin/bash -c "
      sleep 5;
      /usr/bin/mc config --quiet host add myminio http://minio:9000 minio minio123;
      /usr/bin/mc mb --quiet myminio/datalake
      "
    depends_on:
      - minio
    profiles:
        - datalake

networks:
  default:
    external:
      name: dbt-net
